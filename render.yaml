# Blueprint opcional para Render (Dashboard → New → Blueprint).
# Ajuste los nombres y conecte el repo antes de aplicar.

services:
  - type: web
    name: construproformas-api
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_PATH
        value: /app/data/construproformas.db
      - key: DB_SYNCHRONIZE
        value: true
      - key: API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://construproformas-web.onrender.com
      - key: IVA_RATE
        value: 0.15

staticSites:
  - name: construproformas-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_API_KEY
        sync: false
      - key: VITE_ACCESS_PIN
        value: "2585"
