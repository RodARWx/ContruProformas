services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: construproformas-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/construproformas.db
      DB_SYNCHRONIZE: "true"
      IVA_RATE: ${IVA_RATE:-0.15}
      API_KEY: ${API_KEY:-construproformas-dev-key}
    volumes:
      # Volumen persistente para la base de datos SQLite en el NAS
      - sqlite-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  sqlite-data:
    driver: local
